name: Sync Release from PharmaNet

on:
  repository_dispatch:
    types: [ build-release ]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APKs and publish release
    runs-on: ubuntu-latest
    env:
      FLUTTER_DEBUG_INFO_PATH: build/app/outputs/symbols
    steps:
    - name: Parse dispatch payload
      id: payload
      run: |
        echo "tag_name=${{ github.event.client_payload.tag_name }}" >> "$GITHUB_OUTPUT"
        echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"

    - name: Clone the pharmanet repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: pharmanet-org/pharmanet
        ref: ${{ github.event.client_payload.tag_name }}
        token: ${{ secrets.PHARMANET_PAT }}
        path: code
        fetch-depth: 0

    - name: Get Flutter version
      id: get-flutter-version
      uses: zgosalvez/github-actions-get-flutter-version-env@db80c000d15b0a11d86bfa4d5a9dc885f054f46d
      with:
        pubspec-file-path: code/pubspec.yaml

    - name: Cache Flutter
      id: flutter-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: flutter
        key: flutter-cache-ubuntu-latest-${{ steps.get-flutter-version.outputs.version }}-${{ hashFiles('code/pubspec.lock') }}
        restore-keys: |
          flutter-cache-ubuntu-latest-${{ steps.get-flutter-version.outputs.version }}-
          flutter-cache-ubuntu-latest-
          flutter-cache-

    - name: Clone the Flutter repository
      if: steps.flutter-cache.outputs.cache-hit != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: flutter/flutter
        ref: ${{ steps.get-flutter-version.outputs.version }}
        path: flutter

    - name: Add the flutter tool to the path
      run: |
        echo "$GITHUB_WORKSPACE/flutter/bin" >> "$GITHUB_PATH"
        echo "$GITHUB_WORKSPACE/flutter/bin/cache/dart-sdk/bin" >> "$GITHUB_PATH"

    - name: Populate the Flutter tool's cache of binary artifacts
      if: steps.flutter-cache.outputs.cache-hit != 'true'
      run: |
        flutter config --no-analytics
        flutter precache

    - name: Get Flutter packages
      run: flutter pub get
      working-directory: code

    - name: Parse pubspec version
      id: parse-pubspec-version
      run: |
        VERSION_LINE=$(grep '^version:' pubspec.yaml | head -n1)
        VERSION=${VERSION_LINE#version: }
        VERSION=${VERSION// /}
        if [[ "$VERSION" == "$VERSION_LINE" ]]; then
          echo "::error::Could not read version from pubspec.yaml"
          exit 1
        fi
        APP_VERSION=${VERSION%%+*}
        echo "full_version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
        BUILD_NUMBER=${VERSION#*+}
        echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
      working-directory: code

    - name: Build Android APKs
      run: |
        flutter build apk \
          --obfuscate \
          --split-debug-info=$FLUTTER_DEBUG_INFO_PATH \
          --split-per-abi \
          --build-name=${{ steps.parse-pubspec-version.outputs.app_version }} \
          --build-number=${{ steps.parse-pubspec-version.outputs.build_number }}

        # Rename with clean semver (no +buildNumber)
        mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
          ../PharmaNet-armeabi-v7a-v${{ steps.parse-pubspec-version.outputs.app_version }}.apk
        mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
          ../PharmaNet-arm64-v8a-v${{ steps.parse-pubspec-version.outputs.app_version }}.apk
        mv build/app/outputs/flutter-apk/app-x86_64-release.apk \
          ../PharmaNet-x86_64-v${{ steps.parse-pubspec-version.outputs.app_version }}.apk
      working-directory: code

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ steps.parse-pubspec-version.outputs.app_version }}"
        TAG="v${VERSION}"

        RELEASE_NOTES=$(cat << 'ENOTES'
        ${{ github.event.client_payload.release_notes }}
        ENOTES
        )

        gh release create "$TAG" \
          --repo "${{ github.repository }}" \
          --title "v$VERSION" \
          --notes "$RELEASE_NOTES" \
          PharmaNet-armeabi-v7a-v"$VERSION".apk \
          PharmaNet-arm64-v8a-v"$VERSION".apk \
          PharmaNet-x86_64-v"$VERSION".apk
